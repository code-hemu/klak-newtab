name: Create binary for release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      retention_days:
        description: 'Retention duration (in days)'
        required: true
        default: 1
      node_version:
        description: 'NodeJS version'
        required: true
        default: '22.x'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ github.event.inputs.node_version || '22.x' }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build the extension
        run: npm run release

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/klak-newtab-chrome.zip
            build/release/klak-newtab-firefox.xpi

      - name: Upload built artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          path: |
            build/release/klak-newtab-chrome.zip
            build/release/klak-newtab-firefox.xpi
          retention-days: ${{ github.event.inputs.retention_days || 1 }}